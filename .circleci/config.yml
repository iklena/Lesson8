version: 2.1

jobs:
  node-job:
    docker:
      - image: node-24.16.0-chrome-149.0.7827.102-1-ff-151.0.4-edge-149.0.4022.52-1

    steps:
      - checkout

      - run:
          name: Install dependencies
          command: |
            sudo apt-get update
            sudo apt-get install -y unzip

      - run:
          name: Install npm packages
          command: npm ci

      - run:
          name: Install Allure
          command: |
            curl -sSL https://github.com/allure-framework/allure2/releases/download/2.19.0/allure-2.19.0.zip -o allure.zip
            sudo unzip allure.zip -d /opt/allure
            sudo ln -s /opt/allure/allure-2.19.0/bin/allure /usr/bin/allure

      - run:
          name: Run tests
          command: npx cypress run

      - run:
          name: Generate report
          command: npm run allure:report

      - store_artifacts:
          path: allure-report
          destination: CypressReport

workflows:
  build-and-test:
    jobs:
      - node-job
